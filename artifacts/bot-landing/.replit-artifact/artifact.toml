kind = "web"
previewPath = "/"
title = "4kpnote Voice Bot"
version = "1.0.0"
id = "artifacts/bot-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20341

[services.development]
run = "pnpm --filter @workspace/bot-landing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bot-landing", "run", "build" ]
publicDir = "artifacts/bot-landing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20341"
BASE_PATH = "/"
